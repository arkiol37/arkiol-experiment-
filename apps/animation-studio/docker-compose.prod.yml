version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-animation_studio}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  # ── DB Migrations (runs once on deploy) ───────────────────────
  migrate:
    image: animation-studio-backend:${IMAGE_TAG:-latest}
    command: node -e "
      const knex = require('knex');
      const config = require('./dist/config/database').default;
      config.migrate.latest().then(() => { console.log('Migrations complete'); process.exit(0); }).catch(e => { console.error(e); process.exit(1); });
    "
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  # ── API Server (2 replicas) ───────────────────────────────────
  api:
    image: animation-studio-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 512m
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Render Worker (2 replicas, 2GB RAM for FFmpeg) ────────────
  worker:
    image: animation-studio-backend:${IMAGE_TAG:-latest}
    command: node dist/workers/renderWorker.js
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
      RENDER_CONCURRENCY: '3'
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          memory: 2g
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s

  # ── Bull Board Queue Monitor (internal only) ──────────────────
  bull-board:
    image: animation-studio-backend:${IMAGE_TAG:-latest}
    command: >
      node -e "
      const { createBullBoard } = require('@bull-board/api');
      const { BullAdapter } = require('@bull-board/api/bullAdapter');
      const { ExpressAdapter } = require('@bull-board/express');
      const Bull = require('bull');
      const express = require('express');
      const queue = new Bull('render', process.env.REDIS_URL);
      const serverAdapter = new ExpressAdapter();
      createBullBoard({ queues: [new BullAdapter(queue)], serverAdapter });
      serverAdapter.setBasePath('/admin/queues');
      const app = express();
      app.use('/admin/queues', serverAdapter.getRouter());
      app.listen(3001, () => console.log('Bull Board at :3001'));
      "
    env_file: .env.prod
    environment:
      NODE_ENV: production
    expose:
      - '3001'
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  postgres_data:
  redis_data:
  nginx_logs:
