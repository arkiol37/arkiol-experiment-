# docker-compose.worker.yml
# Runs the Arkiol BullMQ worker process with all native dependencies.
# The Next.js API is deployed to Vercel; only the worker runs here.
#
# Usage:
#   docker compose -f docker-compose.worker.yml up -d
#   docker compose -f docker-compose.worker.yml logs -f worker

version: "3.9"

services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: arkiol-worker:latest
    restart: unless-stopped
    environment:
      NODE_ENV:                   production
      NODE_OPTIONS:               "--max-old-space-size=2048"
      # Redis (required)
      REDIS_HOST:                 ${REDIS_HOST:?REDIS_HOST required}
      REDIS_PORT:                 ${REDIS_PORT:-6379}
      REDIS_PASSWORD:             ${REDIS_PASSWORD:-}
      REDIS_TLS:                  ${REDIS_TLS:-false}
      # Database (required)
      DATABASE_URL:               ${DATABASE_URL:?DATABASE_URL required}
      # AWS S3 (required)
      AWS_REGION:                 ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID:          ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID required}
      AWS_SECRET_ACCESS_KEY:      ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY required}
      S3_BUCKET_NAME:             ${S3_BUCKET_NAME:?S3_BUCKET_NAME required}
      CLOUDFRONT_DOMAIN:          ${CLOUDFRONT_DOMAIN:-}
      # OpenAI (required)
      OPENAI_API_KEY:             ${OPENAI_API_KEY:?OPENAI_API_KEY required}
      # Sentry (optional)
      SENTRY_DSN:                 ${SENTRY_DSN:-}
      # Worker tuning
      WORKER_CONCURRENCY:         ${WORKER_CONCURRENCY:-3}
      LOG_LEVEL:                  ${LOG_LEVEL:-info}
    volumes:
      # Persist nothing from the container -- all state is in DB/Redis/S3
      []
    deploy:
      resources:
        limits:
          memory: 2g
          cpus:   "2.0"
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD", "node", "-e",
             "const r = require('ioredis'); new r({ host: process.env.REDIS_HOST, password: process.env.REDIS_PASSWORD }).ping().then(() => process.exit(0)).catch(() => process.exit(1))"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Optional: Local Redis for development
  # Remove in production -- use a managed Redis (Upstash, Railway, Render)
  redis:
    image: redis:7-alpine
    profiles:
      - local
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

volumes:
  redis_data:
