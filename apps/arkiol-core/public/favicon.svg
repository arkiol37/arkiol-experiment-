<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6EE7F7"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="f">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0A0A12"/>
  <!-- Outer arc -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="url(#g)" stroke-width="1.2"
          stroke-dasharray="56 24" stroke-linecap="round" opacity="0.6"/>
  <!-- A mark -->
  <g filter="url(#f)">
    <line x1="16" y1="5"  x2="7"  y2="27" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="16" y1="5"  x2="25" y2="27" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="11" y1="18" x2="21" y2="18" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <!-- Dot -->
  <circle cx="29" cy="16" r="2" fill="#A78BFA" filter="url(#f)"/>
</svg>
