# fly.toml — Arkiol Worker deployment on Fly.io
# Deploy: fly deploy --config fly.toml
# Scale:  fly scale count 2 --app arkiol-worker

app    = "arkiol-worker"
primary_region = "iad"  # US East — change to match your DB region

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV             = "production"
  NODE_OPTIONS         = "--max-old-space-size=2048"
  WORKER_CONCURRENCY   = "3"
  LOG_LEVEL            = "info"

# Secrets (set via `fly secrets set KEY=value`):
#   DATABASE_URL, REDIS_HOST, REDIS_PORT, REDIS_PASSWORD, REDIS_TLS
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, S3_BUCKET_NAME
#   OPENAI_API_KEY, SENTRY_DSN

[[services]]
  # Workers don't serve HTTP -- no port binding needed
  # Comment this out unless you add a health HTTP endpoint
  internal_port = 0
  protocol      = "tcp"

[checks]
  [checks.redis_ping]
    type     = "script"
    command  = ["/bin/sh", "-c", "node -e \"const r=require('ioredis');new r({host:process.env.REDIS_HOST,password:process.env.REDIS_PASSWORD}).ping().then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
    interval = "30s"
    timeout  = "10s"

[metrics]
  port = 9091
  path = "/metrics"

[[vm]]
  memory     = "2gb"
  cpu_kind   = "shared"
  cpus       = 2
