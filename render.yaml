# render.yaml — Render deployment manifest for the ARKIOL generation
# backend. Committing this file lets a Render operator point Render
# at the repo and get the service provisioned with the correct build
# + start commands automatically.
#
# IMPORTANT — cold starts:
#   The `starter` plan hibernates after ~15 min idle and takes
#   30-60s to wake on the next request. The Vercel forwarder
#   (apps/arkiol-core/src/lib/renderDispatch.ts) waits up to 50s
#   total (2× 25s with retry) and falls back to "still queued"
#   when even that isn't enough. For production traffic, upgrade
#   to a non-hibernating plan (`standard` or above) so the
#   service stays warm.
#
# Expected secrets (set these in the Render dashboard, NOT here):
#   DATABASE_URL              — same Postgres Vercel uses
#   OPENAI_API_KEY            — OpenAI key used by the pipeline
#   RENDER_GENERATION_KEY     — shared secret, must match Vercel's
#                               RENDER_GENERATION_KEY
#   ALLOWED_ORIGINS           — comma-separated Vercel origins
#   S3_BUCKET, S3_REGION,
#   S3_ACCESS_KEY_ID,
#   S3_SECRET_ACCESS_KEY      — optional; SVG data URLs fall back
services:
  - type: web
    name: arkiol-render-backend
    env: node
    plan: starter
    region: oregon
    rootDir: .
    # The build step must (1) install workspace deps from the repo
    # root so `file:../..` workspace references resolve, (2) generate
    # the Prisma client against the shared schema, and (3) type-check
    # the backend. We run the server under tsx (no dist emit needed).
    buildCommand: |
      npm install --legacy-peer-deps
      npx prisma generate --schema=packages/shared/prisma/schema.prisma
      npm run type-check --workspace=apps/render-backend
    startCommand: npm run start --workspace=apps/render-backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4100
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RENDER_GENERATION_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
