name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci'
  NEXTAUTH_SECRET: 'ci-placeholder-secret-at-least-32-chars-long!!'
  NEXTAUTH_URL: 'http://localhost:3000'
  SKIP_DB_MIGRATE: 'true'
  NODE_ENV: 'test'

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            apps/*/backend/node_modules
            apps/*/frontend/node_modules
            packages/*/node_modules
          key: deps-${{ hashFiles('package-lock.json') }}

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            apps/*/backend/node_modules
            apps/*/frontend/node_modules
            packages/*/node_modules
          key: deps-${{ hashFiles('package-lock.json') }}
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/shared/prisma/schema.prisma
      - name: Lint arkiol-core
        run: npm run lint --workspace=apps/arkiol-core
      - name: Lint animation-studio backend
        run: npm run lint --workspace=apps/animation-studio/backend

  typecheck:
    name: TypeScript
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            apps/*/backend/node_modules
            apps/*/frontend/node_modules
            packages/*/node_modules
          key: deps-${{ hashFiles('package-lock.json') }}
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/shared/prisma/schema.prisma
      - name: Typecheck shared
        run: npm run type-check --workspace=packages/shared
      - name: Typecheck arkiol-core
        run: npm run type-check --workspace=apps/arkiol-core
      - name: Typecheck animation-studio backend
        run: npm run type-check --workspace=apps/animation-studio/backend

  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            apps/*/backend/node_modules
            apps/*/frontend/node_modules
            packages/*/node_modules
          key: deps-${{ hashFiles('package-lock.json') }}
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/shared/prisma/schema.prisma
      - name: Build shared
        run: npm run build --workspace=packages/shared
      - name: Build arkiol-core (Next.js)
        run: npm run build --workspace=apps/arkiol-core
      - name: Build animation-studio backend
        run: npm run build --workspace=apps/animation-studio/backend

  test:
    name: Test
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            apps/*/backend/node_modules
            apps/*/frontend/node_modules
            packages/*/node_modules
          key: deps-${{ hashFiles('package-lock.json') }}
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/shared/prisma/schema.prisma
      - name: Run tests
        run: npm test --workspaces --if-present

  prisma-validate:
    name: Prisma Schema
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            apps/*/backend/node_modules
            apps/*/frontend/node_modules
            packages/*/node_modules
          key: deps-${{ hashFiles('package-lock.json') }}
      - name: Validate Prisma schema
        run: npx prisma validate --schema=packages/shared/prisma/schema.prisma
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/shared/prisma/schema.prisma
